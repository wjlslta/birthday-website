<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#3d2438">
    <title>Janice's Birthday Gallery</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stalemate&family=Tangerine:wght@400;700&family=Poppins:wght@400;600&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body>


<div id="myOverlay" class="overlay hidden">
        <div class="content">
            <span id="bdaymessage">Janice, Will you be my Girlfriend?? </span><span class="cursor">|</span>
            <div class="button-container">
                <button id="yesbtn" class="btn">Yes</button>
                <button id="nobtn" class="btn">No</button>
            </div>
        </div>
    </div>




  <!-- ═══════════════════════════════════════════ -->
  <!-- HERO — fills one viewport, scrolls to gallery -->
  <!-- ═══════════════════════════════════════════ -->
  <section class="hero">
    <div class="hero-inner">
        <h1>Happy 19th Birthday to Janice 🤎</h1>
        <p class="subtitle">Memories from everyone who loves you</p>
        <div class="countdown" id="countdown">Loading...</div>
    </div>
    <div class="scroll-cue">Scroll</div>
  </section>

    <div class="container">
        <div class="divider">✦ ✦ ✦</div>

        <div class="master-content">
            <!-- Gallery Section — full width, read-only -->
            <div class="gallery-section">
                <h2><i class="fas fa-images"></i> Memories for Janice</h2>
                <div class="gallery" id="gallery">
                    <div class="empty-gallery">
                        <i class="fas fa-inbox"></i>
                        <p>No memories yet.<br>Check back soon! 💝</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for viewing entries (view + download only, no delete) -->
    <div class="modal" id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-media" id="modalMedia"></div>
            <div class="modal-info">
                <h3 id="modalName"></h3>
                <p id="modalMessage"></p>
                <small id="modalTime" style="color: var(--color-text-muted);"></small>
                <div class="modal-actions" id="modalActions"></div>
            </div>
        </div>
    </div>

    <script src="master.js"></script>
</body>
</html>
