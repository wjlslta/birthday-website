<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 19th Birthday Janice! 🤎</title>
    <link href="https://cloudflare.com" rel="stylesheet">
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #8B6B63 0%, #A67B7B 50%, #8B6B63 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 50px,
                rgba(139, 107, 99, 0.3) 50px,
                rgba(139, 107, 99, 0.3) 100px
            );
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            color: #f5e6d3;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            font-weight: 700;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.8rem;
            opacity: 0.95;
            font-weight: 300;
            font-style: italic;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .upload-section {
            background: #f5e6d3;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 3px solid #D4A574;
            position: relative;
        }

        .section-title {
            color: #8B6B63;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 2rem;
            font-weight: 600;
        }

        .message-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            color: #8B6B63;
            font-weight: 600;
        }

        .form-group input, .form-group textarea {
            padding: 12px;
            border: 2px solid #D4A574;
            border-radius: 8px;
            background: rgba(245, 230, 211, 0.5);
            font-family: 'Poppins', sans-serif;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8B6B63 0%, #A67B7B 100%);
            color: #f5e6d3;
            border: 2px solid #8B6B63;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 107, 99, 0.4);
        }

        /* Popup Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(139, 107, 99, 0.7);
            backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal-content-card {
            position: relative;
            max-width: 500px;
            width: 90%;
            background: transparent;
            text-align: center;
        }

        .thank-you-img {
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .close-modal-btn {
            position: absolute;
            top: -45px;
            right: 0;
            background: none;
            border: none;
            color: #f5e6d3;
            font-size: 2.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Happy 19th Birthday Janice! 🤎</h1>
        <p>Leave a beautiful greeting</p>
    </header>

    <div class="main-content">
        <!-- Message Box Section -->
        <div class="upload-section">
            <h2 class="section-title"><i class="fa-solid fa-pen-fancy"></i> Write a Greeting</h2>
            
            <form class="message-form" onsubmit="showThankYouCard(event)">
                <div class="form-group">
                    <label for="username">Your Name:</label>
                    <input type="text" id="username" required placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label for="message">Your Message:</label>
                    <textarea id="message" rows="5" required placeholder="Type your sweet birthday wishes here..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-paper-plane"></i> Send Message
                </button>
            </form>
        </div>

        <!-- Decorative Info / Description Section -->
        <div class="upload-section" style="display: flex; flex-direction: column; justify-content: center; text-align: center; color: #8B6B63;">
            <h3 style="font-size: 2rem; margin-bottom: 15px;">Celebrating Janice ✨</h3>
            <p style="font-family: 'Poppins', sans-serif; font-size: 1rem; line-height: 1.6;">
                Every message sent will unlock a special token of appreciation. Thank you for making this 19th birthday unforgettable!
            </p>
        </div>
    </div>
</div>

<!-- Hidden Thank You Popup Modal -->
<div id="thankYouModal" class="modal-overlay">
    <div class="modal-content-card">
        <button class="close-modal-btn" onclick="closeModal()">&times;</button>
        <!-- This references the exact PNG file you uploaded to GitHub -->
        <img src="thankyou-card.png" alt="Thank You Janice" class="thank-you-img">
    </div>
</div>

<script>
    function showThankYouCard(event) {
        event.preventDefault(); // Keeps page from refreshing and losing the view
        document.getElementById('thankYouModal').style.display = 'flex';
        
        // Optional: Clear out form inputs after sending
        document.getElementById('username').value = '';
        document.getElementById('message').value = '';
    }

    function closeModal() {
        document.getElementById('thankYouModal').style.display = 'none';
    }
</script>

</body>
</html>
