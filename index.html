<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 19th Birthday Janice! 🤎</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #8B6B63 0%, #A67B7B 50%, #8B6B63 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 50px,
                rgba(139, 107, 99, 0.3) 50px,
                rgba(139, 107, 99, 0.3) 100px
            );
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            color: #f5e6d3;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease;
        }

        header h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            font-weight: 700;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.8rem;
            opacity: 0.95;
            font-weight: 300;
            font-style: italic;
        }

        .countdown {
            font-size: 1.1rem;
            margin-top: 15px;
            background: rgba(245, 230, 211, 0.15);
            padding: 12px 30px;
            border-radius: 50px;
            display: inline-block;
            border: 2px solid rgba(245, 230, 211, 0.3);
        }

        .divider {
            text-align: center;
            margin: 40px 0;
            color: rgba(245, 230, 211, 0.5);
            font-size: 2rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }

        .upload-section {
            background: #f5e6d3;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInLeft 0.8s ease;
            border: 3px solid #D4A574;
            position: relative;
        }

        .upload-section::before,
        .upload-section::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #D4A574;
        }

        .upload-section::before {
            top: 10px;
            left: 10px;
            border-right: none;
            border-bottom: none;
        }

        .upload-section::after {
            bottom: 10px;
            right: 10px;
            border-left: none;
            border-top: none;
        }

        .section-title {
            color: #8B6B63;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 2rem;
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #D4A574;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: none;
            font-size: 1rem;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #8B6B63;
            border-bottom-color: #8B6B63;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .drop-zone {
            border: 3px dashed #D4A574;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(212, 165, 116, 0.1);
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: #8B6B63;
            background: rgba(212, 165, 116, 0.2);
            transform: scale(1.02);
        }

        .drop-zone i {
            font-size: 3rem;
            color: #8B6B63;
            margin-bottom: 15px;
        }

        .drop-zone p {
            color: #8B6B63;
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .drop-zone small {
            color: #A67B7B;
            display: block;
            margin-top: 10px;
        }

        video, canvas {
            width: 100%;
            border-radius: 15px;
            background: #000;
        }

        .video-controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8B6B63 0%, #A67B7B 100%);
            color: #f5e6d3;
            border: 2px solid #8B6B63;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 107, 99, 0.4);
            background: linear-gradient(135deg, #6B4B4B 0%, #8B5B5B 100%);
        }

        .btn-secondary {
            background: rgba(212, 165, 116, 0.2);
            color: #8B6B63;
            border: 2px solid #8B6B63;
        }

        .btn-secondary:hover {
            background: #8B6B63;
            color: #f5e6d3;
        }

        .btn-danger {
            background: #A67B7B;
            color: #f5e6d3;
        }

        .btn-danger:hover {
            background: #8B5B5B;
        }

        .btn-success {
            background: #8B6B63;
            color: #f5e6d3;
        }

        .btn-success:hover {
            background: #6B4B4B;
        }

        .btn-sm {
            padding: 8px 12px;
            font-size: 0.85rem;
            gap: 5px;
        }

        .btn-info {
            background: #D4A574;
            color: #8B6B63;
        }

        .btn-info:hover {
            background: #C89560;
        }

        /* Photobooth Styles */
        .photobooth-container {
            background: rgba(212, 165, 116, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            margin-top: 30px;
            border-top: 2px solid #D4A574;
            padding-top: 30px;
        }

        .camera-frame {
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
            aspect-ratio: 4/3;
        }

        .frame-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .frame-option {
            padding: 8px 15px;
            border: 2px solid #D4A574;
            background: rgba(212, 165, 116, 0.2);
            color: #8B6B63;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .frame-option.active {
            background: #8B6B63;
            color: #f5e6d3;
            border-color: #8B6B63;
        }

        .frame-option:hover {
            transform: translateY(-2px);
        }

        .countdown-timer {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            color: #f5e6d3;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .countdown-timer.active {
            display: block;
            animation: pulse 1s infinite;
        }

        #photoboothCanvas {
            display: block;
            margin: 0 auto;
        }

        .frame-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .message-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-form input,
        .message-form textarea {
            padding: 12px 15px;
            border: 2px solid #D4A574;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
        }

        .message-form input:focus,
        .message-form textarea:focus {
            outline: none;
            border-color: #8B6B63;
            box-shadow: 0 0 0 3px rgba(139, 107, 99, 0.1);
            background: white;
        }

        .message-form textarea {
            resize: vertical;
            min-height: 100px;
        }

        .gallery-section {
            animation: fadeInRight 0.8s ease;
        }

        .gallery-section h2 {
            color: #f5e6d3;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 2rem;
            font-weight: 600;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: #f5e6d3;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid #D4A574;
            position: relative;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: #8B6B63;
        }

        .gallery-item-media {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #8B6B63 0%, #A67B7B 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .gallery-item-media img,
        .gallery-item-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item-content {
            padding: 15px;
        }

        .gallery-item-name {
            font-weight: 600;
            color: #8B6B63;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .gallery-item-message {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.4;
            max-height: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .gallery-item-time {
            color: #999;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .gallery-item-type {
            display: inline-block;
            background: rgba(212, 165, 116, 0.3);
            color: #8B6B63;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .gallery-item-actions {
            display: none;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #D4A574;
        }

        .gallery-item.admin .gallery-item-actions {
            display: flex;
        }

        .empty-gallery {
            text-align: center;
            color: #f5e6d3;
            padding: 60px 20px;
        }

        .empty-gallery i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-gallery p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #f5e6d3;
            border-radius: 20px;
            padding: 30px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            border: 3px solid #D4A574;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        .modal-close:hover {
            color: #8B6B63;
        }

        .modal-media {
            margin-bottom: 20px;
        }

        .modal-media img,
        .modal-media video {
            max-width: 100%;
            border-radius: 15px;
        }

        .modal-info {
            color: #666;
            line-height: 1.6;
        }

        .modal-info h3 {
            color: #8B6B63;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #D4A574;
            flex-wrap: wrap;
        }

        .thank-you-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1001;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
            overflow-y: auto;
            padding: 20px;
        }

        .thank-you-modal.active {
            display: flex;
        }

        .thank-you-content {
            text-align: center;
            animation: scaleIn 0.5s ease;
            max-width: 700px;
            width: 100%;
        }

        .thank-you-card {
            background: white;
            border-radius: 20px;
            padding: 0;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
            overflow: hidden;
            position: relative;
        }

        .thank-you-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .thank-you-close {
            background: #8B6B63;
            color: #f5e6d3;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .thank-you-close:hover {
            background: #6B4B4B;
            transform: translateY(-2px);
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            header h1 {
                font-size: 2.5rem;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .frame-selector {
                gap: 8px;
            }

            .frame-option {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }

        .success-message {
            background: #8B6B63;
            color: #f5e6d3;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .photobooth-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .photobooth-preview {
            margin-top: 15px;
            text-align: center;
        }

        .photobooth-preview img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .photobooth-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .photobooth-divider {
            text-align: center;
            margin: 30px 0 20px 0;
            color: #D4A574;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Happy 19th Birthday to Janice 🤎</h1>
            <p>Share your memories with me</p>
            <div class="countdown" id="countdown">Loading...</div>
        </header>

        <div class="divider">✦ ✦ ✦</div>

        <div class="main-content">
            <!-- Upload & Photobooth Section -->
            <div>
                <!-- Upload Section -->
                <div class="upload-section">
                    <h2 class="section-title"><i class="fas fa-heart"></i> Add Your Memory</h2>

                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchTab('photo')">📸 Photo</button>
                        <button class="tab-btn" onclick="switchTab('video')">🎥 Video</button>
                        <button class="tab-btn" onclick="switchTab('message')">💬 Message</button>
                        <button class="tab-btn" onclick="switchTab('photobooth')">📷 Photobooth</button>
                    </div>

                    <div id="photo" class="tab-content active">
                        <div class="drop-zone" id="dropZone" onclick="document.getElementById('photoInput').click()">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p><strong>Click to upload or drag & drop</strong></p>
                            <small>PNG, JPG up to 5MB</small>
                        </div>
                        <input type="file" id="photoInput" accept="image/*" style="display: none;">
                        <div id="photoPreview" class="preview"></div>
                    </div>

                    <div id="video" class="tab-content">
                        <p style="margin-bottom: 15px; color: #666;">Click start to record your birthday message (max 30 seconds)</p>
                        <div class="video-controls">
                            <button class="btn btn-success" id="startRecordBtn" onclick="startRecording()">
                                <i class="fas fa-circle"></i> Start Recording
                            </button>
                            <button class="btn btn-danger" id="stopRecordBtn" onclick="stopRecording()" style="display: none;">
                                <i class="fas fa-stop-circle"></i> Stop Recording
                            </button>
                        </div>
                        <div id="recordingStatus"></div>
                        <div id="videoPreviewContainer" class="preview"></div>
                    </div>

                    <div id="message" class="tab-content">
                        <form class="message-form" onsubmit="submitAll(event)">
                            <input type="text" id="userName" placeholder="Your name" required>
                            <textarea id="userMessage" placeholder="Write your birthday message..." required></textarea>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-paper-plane"></i> Send Message
                            </button>
                        </form>
                    </div>

                    <div id="photobooth" class="tab-content">
                        <div class="photobooth-container">
                            <div style="margin-bottom: 15px;">
                                <label style="color: #8B6B63; font-weight: 600;">Choose Frame:</label>
                                <div class="frame-selector">
                                    <button class="frame-option active" onclick="selectFrame('classic')">Classic</button>
                                    <button class="frame-option" onclick="selectFrame('hearts')">Hearts 🤎</button>
                                </div>
                            </div>

                            <div class="camera-frame" id="cameraFrame">
                                <video id="photoboothVideo" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
                                <div class="countdown-timer" id="countdownTimer"></div>
                                <canvas id="photoboothCanvas" style="display: none;"></canvas>
                            </div>

                            <div class="photobooth-buttons">
                                <button class="btn btn-success" id="startPhotobooth" onclick="startPhotobooth()">
                                    <i class="fas fa-power-off"></i> Start Camera
                                </button>
                                <button class="btn btn-danger" id="stopPhotobooth" onclick="stopPhotobooth()" style="display: none;">
                                    <i class="fas fa-stop"></i> Stop Camera
                                </button>
                                <button class="btn btn-primary" id="capturePhoto" onclick="capturePhoto()" style="display: none;">
                                    <i class="fas fa-camera"></i> Capture (3s)
                                </button>
                            </div>

                            <div class="photobooth-preview" id="photoboothPreview"></div>
                        </div>
                    </div>

                    <div class="success-message" id="successMessage">
                        <i class="fas fa-check-circle"></i> Successfully added to the gallery!
                    </div>
                </div>
            </div>

            <!-- Gallery Section -->
            <div class="gallery-section">
                <h2><i class="fas fa-images"></i> Gallery</h2>
                <div class="gallery" id="gallery">
                    <div class="empty-gallery">
                        <i class="fas fa-inbox"></i>
                        <p>No memories yet.<br>Be the first to share! 💝</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-media" id="modalMedia"></div>
            <div class="modal-info">
                <h3 id="modalName"></h3>
                <p id="modalMessage"></p>
                <small id="modalTime" style="color: #999;"></small>
                <div class="modal-actions" id="modalActions"></div>
            </div>
        </div>
    </div>

    <!-- Thank You Modal -->
    <div class="thank-you-modal" id="thankYouModal" onclick="closeThankYou(event)">
        <div class="thank-you-content" onclick="event.stopPropagation()">
            <div class="thank-you-card">
                <img src="https://raw.githubusercontent.com/wjlslta/birthday-website/main/thank-you.png" alt="Thank You Card">
            </div>
            <button class="thank-you-close" onclick="closeThankYou()">Back to Gallery</button>
        </div>
    </div>

    <script>
        let mediaFile = null;
        let videoRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let recordingTime = 0;
        let currentFrame = 'classic';
        let photoboothStream = null;

        document.addEventListener('DOMContentLoaded', function() {
            updateCountdown();
            setInterval(updateCountdown, 1000);
            loadGallery();
            setupDropZone();
        });

        function updateCountdown() {
            const targetDate = new Date('2026-06-28T00:00:00').getTime();
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById('countdown').innerHTML = '🎉 It\'s your birthday! 🎉';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('countdown').innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s until the celebration!`;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function setupDropZone() {
            const dropZone = document.getElementById('dropZone');
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                handlePhotoUpload(e.dataTransfer.files[0]);
            });
        }

        document.getElementById('photoInput').addEventListener('change', (e) => {
            handlePhotoUpload(e.target.files[0]);
        });

        function handlePhotoUpload(file) {
            if (!file) return;
            mediaFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('photoPreview').innerHTML = `
                    <img src="${e.target.result}" alt="preview">
                    <button class="btn btn-primary" style="margin-top: 15px;" onclick="submitPhoto()">
                        <i class="fas fa-upload"></i> Upload Photo
                    </button>
                `;
            };
            reader.readAsDataURL(file);
        }

        // Photobooth Functions
        function selectFrame(frame) {
            currentFrame = frame;
            document.querySelectorAll('.frame-option').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function startPhotobooth() {
            try {
                photoboothStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                document.getElementById('photoboothVideo').srcObject = photoboothStream;
                document.getElementById('startPhotobooth').style.display = 'none';
                document.getElementById('stopPhotobooth').style.display = 'flex';
                document.getElementById('capturePhoto').style.display = 'flex';
            } catch (error) {
                alert('Could not access camera. Please check permissions.');
            }
        }

        function stopPhotobooth() {
            if (photoboothStream) {
                photoboothStream.getTracks().forEach(track => track.stop());
                document.getElementById('startPhotobooth').style.display = 'flex';
                document.getElementById('stopPhotobooth').style.display = 'none';
                document.getElementById('capturePhoto').style.display = 'none';
            }
        }

        function capturePhoto() {
            const video = document.getElementById('photoboothVideo');
            const canvas = document.getElementById('photoboothCanvas');
            const ctx = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // Draw video frame
            ctx.drawImage(video, 0, 0);

            // Draw frame overlay
            drawFrame(ctx, canvas.width, canvas.height);

            // Show countdown
            let countdown = 3;
            const countdownEl = document.getElementById('countdownTimer');
            countdownEl.classList.add('active');
            countdownEl.textContent = countdown;

            const countdownInterval = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    countdownEl.textContent = countdown;
                } else {
                    clearInterval(countdownInterval);
                    countdownEl.classList.remove('active');

                    // Get image and show preview
                    const imageData = canvas.toDataURL('image/png');
                    showPhotoboothPreview(imageData);
                }
            }, 1000);
        }

        function drawFrame(ctx, width, height) {
            ctx.lineWidth = 8;

            switch(currentFrame) {
                case 'classic':
                    ctx.strokeStyle = '#D4A574';
                    ctx.strokeRect(10, 10, width - 20, height - 20);
                    break;
                case 'hearts':
                    ctx.strokeStyle = '#8B6B63';
                    ctx.lineWidth = 8;
                    ctx.strokeRect(10, 10, width - 20, height - 20);
                    ctx.font = 'bold 40px Arial';
                    ctx.fillStyle = '#8B6B63';
                    ctx.fillText('🤎', 20, 50);
                    ctx.fillText('🤎', width - 70, 50);
                    ctx.fillText('🤎', 20, height - 20);
                    ctx.fillText('🤎', width - 70, height - 20);
                    break;
            }
        }

        function showPhotoboothPreview(imageData) {
            const preview = document.getElementById('photoboothPreview');
            preview.innerHTML = `
                <img src="${imageData}" alt="photobooth">
                <div class="photobooth-actions">
                    <button class="btn btn-secondary" onclick="downloadPhotoboothPhoto('${imageData}')">
                        <i class="fas fa-download"></i> Download
                    </button>
                    <button class="btn btn-primary" onclick="addPhotoboothToGallery('${imageData}')">
                        <i class="fas fa-share"></i> Post to Gallery
                    </button>
                    <button class="btn btn-info" onclick="capturePhoto()">
                        <i class="fas fa-redo"></i> Take Another
                    </button>
                </div>
            `;
        }

        function downloadPhotoboothPhoto(imageData) {
            const link = document.createElement('a');
            link.href = imageData;
            link.download = `photobooth_${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function addPhotoboothToGallery(imageData) {
            const name = prompt('What\'s your name?') || 'Anonymous';
            const message = prompt('Add a message (optional)') || '';

            const entry = {
                type: 'photobooth',
                name: name,
                message: message,
                timestamp: new Date().toLocaleString(),
                data: imageData
            };

            let entries = JSON.parse(localStorage.getItem('birthdayEntries') || '[]');
            entries.push(entry);
            localStorage.setItem('birthdayEntries', JSON.stringify(entries));
            loadGallery();
            showSuccess();

            setTimeout(() => {
                showThankYou();
            }, 800);

            document.getElementById('photoboothPreview').innerHTML = '';
        }

        // Video Recording
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const videoEl = document.createElement('video');
                videoEl.id = 'recordingVideo';
                videoEl.style.display = 'none';
                videoEl.srcObject = stream;
                videoEl.play();
                document.body.appendChild(videoEl);

                const mediaRecorder = new MediaRecorder(stream);
                recordedChunks = [];
                isRecording = true;
                recordingTime = 0;

                mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    mediaFile = blob;
                    stream.getTracks().forEach(track => track.stop());
                    videoEl.remove();

                    const videoUrl = URL.createObjectURL(blob);
                    document.getElementById('videoPreviewContainer').innerHTML = `
                        <video controls style="margin-top: 15px; width: 100%; border-radius: 10px;"></video>
                        <button class="btn btn-primary" style="margin-top: 15px;" onclick="submitVideo()">
                            <i class="fas fa-upload"></i> Upload Video
                        </button>
                    `;
                    document.querySelector('#videoPreviewContainer video').src = videoUrl;
                    isRecording = false;
                };

                setTimeout(() => {
                    if (isRecording) {
                        stopRecording(mediaRecorder);
                    }
                }, 30000);

                videoRecorder = mediaRecorder;
                mediaRecorder.start();

                document.getElementById('startRecordBtn').style.display = 'none';
                document.getElementById('stopRecordBtn').style.display = 'flex';
                document.getElementById('recordingStatus').innerHTML = '<div class="recording-indicator"><i class="fas fa-dot-circle"></i> Recording...</div>';

                updateRecordingTimer();
            } catch (error) {
                alert('Could not access camera. Please check permissions.');
            }
        }

        function stopRecording(recorder = videoRecorder) {
            if (recorder) {
                recorder.stop();
                document.getElementById('startRecordBtn').style.display = 'flex';
                document.getElementById('stopRecordBtn').style.display = 'none';
                document.getElementById('recordingStatus').innerHTML = '';
                isRecording = false;
            }
        }

        function updateRecordingTimer() {
            if (isRecording) {
                recordingTime++;
                document.getElementById('recordingStatus').innerHTML = `<div class="recording-indicator"><i class="fas fa-dot-circle"></i> Recording... ${recordingTime}s</div>`;
                setTimeout(updateRecordingTimer, 1000);
            }
        }

        function submitPhoto() {
            if (!mediaFile) return;
            const entry = createEntry(mediaFile, 'photo');
            addToGallery(entry);
            resetPhotoTab();
        }

        function submitVideo() {
            if (!mediaFile) return;
            const entry = createEntry(mediaFile, 'video');
            addToGallery(entry);
            resetVideoTab();
        }

        function submitAll(event) {
            event.preventDefault();
            const name = document.getElementById('userName').value;
            const message = document.getElementById('userMessage').value;

            const entry = {
                type: 'message',
                name: name,
                message: message,
                timestamp: new Date().toLocaleString(),
                data: message
            };

            addToGallery(entry);
            document.getElementById('userName').value = '';
            document.getElementById('userMessage').value = '';

            setTimeout(() => {
                showThankYou();
            }, 800);

            switchTab('photo');
        }

        function createEntry(file, type) {
            const reader = new FileReader();
            let base64Data = '';

            reader.onload = (e) => {
                base64Data = e.target.result;
            };

            reader.readAsDataURL(file);

            return {
                type: type,
                name: prompt('What\'s your name?') || 'Anonymous',
                message: prompt('Write a short message (optional)') || '',
                timestamp: new Date().toLocaleString(),
                data: file
            };
        }

        function addToGallery(entry) {
            let entries = JSON.parse(localStorage.getItem('birthdayEntries') || '[]');

            if (entry.data instanceof Blob) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    entry.data = e.target.result;
                    entries.push(entry);
                    localStorage.setItem('birthdayEntries', JSON.stringify(entries));
                    loadGallery();
                    showSuccess();
                };
                reader.readAsDataURL(entry.data);
            } else {
                entries.push(entry);
                localStorage.setItem('birthdayEntries', JSON.stringify(entries));
                loadGallery();
                showSuccess();
            }
        }

        function loadGallery() {
            const entries = JSON.parse(localStorage.getItem('birthdayEntries') || '[]');
            const gallery = document.getElementById('gallery');

            if (entries.length === 0) {
                gallery.innerHTML = `
                    <div class="empty-gallery">
                        <i class="fas fa-inbox"></i>
                        <p>No memories yet.<br>Be the first to share! 💝</p>
                    </div>
                `;
                return;
            }

            gallery.innerHTML = entries.map((entry, index) => {
                let mediaHtml = '';
                if (entry.type === 'message') {
                    mediaHtml = `<div style="width: 100%; padding: 20px; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(135deg, #8B6B63 0%, #A67B7B 100%); color: #f5e6d3;">
                        <div>
                            <i class="fas fa-comment" style="font-size: 3rem; margin-bottom: 10px;"></i>
                            <p>${entry.name}</p>
                        </div>
                    </div>`;
                } else if (entry.type === 'photobooth') {
                    mediaHtml = `<img src="${entry.data}" style="width: 100%; height: 100%; object-fit: cover;" alt="photobooth">`;
                } else {
                    mediaHtml = `<${entry.type} src="${entry.data}" controls style="width: 100%; height: 100%; object-fit: cover;"></${entry.type}>`;
                }

                return `
                    <div class="gallery-item admin" onclick="openModal(${index})">
                        <div class="gallery-item-media">${mediaHtml}</div>
                        <div class="gallery-item-content">
                            <div class="gallery-item-name">${entry.name}</div>
                            <div class="gallery-item-message">${entry.message || 'No message'}</div>
                            <div class="gallery-item-type">${entry.type === 'photobooth' ? '📷 Photobooth' : entry.type}</div>
                            <div class="gallery-item-time">${entry.timestamp}</div>
                            <div class="gallery-item-actions" onclick="event.stopPropagation()">
                                <button class="btn btn-secondary btn-sm" onclick="downloadEntry(${index})">
                                    <i class="fas fa-download"></i> Download
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="deleteEntry(${index})">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openModal(index) {
            const entries = JSON.parse(localStorage.getItem('birthdayEntries') || '[]');
            const entry = entries[index];

            if (entry.type === 'message') {
                document.getElementById('modalMedia').innerHTML = `
                    <div style="background: linear-gradient(135deg, #8B6B63 0%, #A67B7B 100%); color: #f5e6d3; padding: 60px 20px; border-radius: 15px; text-align: center;">
                        <i class="fas fa-comment" style="font-size: 4rem; margin-bottom: 20px;"></i>
                        <p style="font-size: 1.2rem;">${entry.name}</p>
                    </div>
                `;
            } else if (entry.type === 'photobooth') {
                document.getElementById('modalMedia').innerHTML = `<img src="${entry.data}" style="width: 100%; border-radius: 15px;" alt="photobooth">`;
            } else {
                document.getElementById('modalMedia').innerHTML = `<${entry.type} src="${entry.data}" controls style="width: 100%; border-radius: 15px;"></${entry.type}>`;
            }

            document.getElementById('modalName').textContent = entry.name;
            document.getElementById('modalMessage').textContent = entry.message || 'No message provided';
            document.getElementById('modalTime').textContent = entry.timestamp;

            document.getElementById('modalActions').innerHTML = `
                <button class="btn btn-secondary" onclick="downloadEntry(${index})">
                    <i class="fas fa-download"></i> Download
                </button>
                <button class="btn btn-danger" onclick="deleteEntry(${index})">
                    <i class="fas fa-trash"></i> Delete
                </button>
            `;

            document.getElementById('modal').classList.add('active');
        }

        function downloadEntry(index) {
            const entries = JSON.parse(localStorage.getItem('birthdayEntries') || '[]');
            const entry = entries[index];

            if (entry.type === 'message') {
                const element = document.createElement('a');
                const file = new Blob([`From: ${entry.name}\n\n${entry.message}`], {type: 'text/plain'});
                element.href = URL.createObjectURL(file);
                element.download = `message_${entry.name}_${Date.now()}.txt`;
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            } else {
                const element = document.createElement('a');
                element.href = entry.data;
                const ext = entry.type === 'photo' ? 'jpg' : entry.type === 'photobooth' ? 'png' : 'webm';
                element.download = `${entry.type}_${entry.name}_${Date.now()}.${ext}`;
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            }
        }

        function deleteEntry(index) {
            if (confirm('Are you sure you want to delete this entry?')) {
                let entries = JSON.parse(localStorage.getItem('birthdayEntries') || '[]');
                entries.splice(index, 1);
                localStorage.setItem('birthdayEntries', JSON.stringify(entries));
                closeModal();
                loadGallery();
                alert('Entry deleted successfully!');
            }
        }

        function closeModal(event) {
            if (event && event.target.id !== 'modal') return;
            document.getElementById('modal').classList.remove('active');
        }

        function resetPhotoTab() {
            document.getElementById('photoInput').value = '';
            document.getElementById('photoPreview').innerHTML = '';
            mediaFile = null;
        }

        function resetVideoTab() {
            const videoEl = document.getElementById('recordingVideo');
            if (videoEl) videoEl.remove();
            document.getElementById('videoPreviewContainer').innerHTML = '';
            mediaFile = null;
            recordedChunks = [];
        }

        function showSuccess() {
            const msg = document.getElementById('successMessage');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        function showThankYou() {
            document.getElementById('thankYouModal').classList.add('active');
        }

        function closeThankYou(event) {
            if (event && event.target.id !== 'thankYouModal') return;
            document.getElementById('thankYouModal').classList.remove('active');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeThankYou();
            }
        });
    </script>
</body>
</html>
